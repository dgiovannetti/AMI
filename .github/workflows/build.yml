# Builds AMI 3.x from 3.0/ (Windows + macOS). Does not attach to Releases — use release-3.0.yml on tags.
name: Build AMI

on:
  push:
    branches: [main, master]
    paths:
      - "3.0/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "3.0/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build-windows:
    name: Build for Windows (3.0)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: "3.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build executable
        run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: AMI-Windows-3.0-Package
          path: 3.0/dist/AMI-Package/
          retention-days: 30

  build-macos:
    name: Build for macOS (3.0)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: "3.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build executable
        run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: AMI-macOS-3.0-Package
          path: 3.0/dist/AMI-Package/
          retention-days: 30
