# Windows build for AMI 3.x (same tree as macOS CI in build-3.0.yml).
name: Build Windows EXE (3.0)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "3.0/**"
      - ".github/workflows/build-windows.yml"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: "3.0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: python build.py

      - name: Zip package (optional download)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $zip = "3.0/dist/AMI-CI-windows.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "3.0/dist/AMI-Package" -DestinationPath $zip -Force

      - name: Upload folder artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMI-3.0-Windows-Package
          path: 3.0/dist/AMI-Package/
          retention-days: 30

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMI-3.0-Windows-ZIP
          path: 3.0/dist/AMI-CI-windows.zip
          retention-days: 14

      - name: SHA256 (ZIP)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $hash = Get-FileHash -Path "3.0/dist/AMI-CI-windows.zip" -Algorithm SHA256
          Set-Content -Path "3.0/dist/SHA256-windows.txt" -Value ("SHA256: " + $hash.Hash)
          Get-Content "3.0/dist/SHA256-windows.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: AMI-3.0-Windows-SHA256
          path: 3.0/dist/SHA256-windows.txt
          retention-days: 14
