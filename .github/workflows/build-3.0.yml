# Build AMI 3.0 (runs from 3.0/ directory)
name: Build AMI 3.0

on:
  push:
    branches: [main, master]
    paths: ['3.0/**']
  pull_request:
    branches: [main, master]
    paths: ['3.0/**']
  workflow_dispatch:

jobs:
  build-windows:
    name: Build 3.0 Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: 3.0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMI-3.0-Windows
          path: 3.0/dist/AMI-Package/
          retention-days: 30

  build-macos:
    name: Build 3.0 macOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: 3.0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMI-3.0-macOS
          path: 3.0/dist/AMI-Package/
          retention-days: 30
